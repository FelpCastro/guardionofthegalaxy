version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: guardian-frontend-prod
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://backend:3001
    networks:
      - guardian-network
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

networks:
  guardian-network:
    driver: bridge
